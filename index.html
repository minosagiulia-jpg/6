<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visite Panoramique</title>
  <link rel="stylesheet" href="pannellum.css"/>
  <script src="pannellum.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    #panorama { width: 100%; height: 100vh; }

    /* Barre de navigation en bas */
    #nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 8px 16px;
    }
    #nav button {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 30px;
      padding: 7px 18px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    #nav button:hover { background: rgba(255,255,255,0.28); }
    #nav button.active {
      background: rgba(255,255,255,0.9);
      color: #111;
      border-color: transparent;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="panorama"></div>

  <div id="nav">
    <button onclick="goTo('scene1')" id="btn-scene1">📷 Entrée</button>
    <button onclick="goTo('scene2')" id="btn-scene2">📷 Terrain</button>
    <button onclick="goTo('scene3')" id="btn-scene3">📷 Gradin</button>
  </div>

  <script>
    var viewer = pannellum.viewer('panorama', {
      default: {
        firstScene: 'scene1',
        sceneFadeDuration: 1000
      },
      scenes: {
        scene1: {
          title: 'Entrée',
          panorama: 'Dehors.jpg',
          autoLoad: true,
          hotSpotDebug: false,
          hotSpots: [
            { pitch: -39, yaw: -37, type: 'scene', sceneId: 'scene2', text: 'Aller → Terrain' }
          ]
        },
        scene2: {
          title: 'Terrain',
          panorama: 'camp.jpg',
          autoLoad: true,
          hotSpotDebug: false,
          hotSpots: [
            { pitch: -7, yaw:  17, type: 'scene', sceneId: 'scene3', text: 'Aller → Gradin' }
          ]
        },
        scene3: {
          title: 'Gradin',
          panorama: 'gradin.jpg',
          autoLoad: true,
          hotSpotDebug: false,
          hotSpots: [
            { pitch: -0.3, yaw: -17, type: 'scene', sceneId: 'scene1', text: '← Retour Entrée' },
            { pitch: -0.3, yaw: -7,  type: 'scene', sceneId: 'scene2', text: '← Retour Terrain' }
          ]
        }
      }
    });

    // Sync boutons de nav avec la scène active
    viewer.on('scenechange', function(sceneId) {
      document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
      var btn = document.getElementById('btn-' + sceneId);
      if (btn) btn.classList.add('active');
    });

    // Activer le premier bouton au démarrage
    document.getElementById('btn-scene1').classList.add('active');

    function goTo(sceneId) {
      viewer.loadScene(sceneId);
    }
  </script>
</body>
</html>
